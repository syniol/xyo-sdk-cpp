name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }}, ${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
        compiler: [gcc, clang, msvc]
        exclude:
          - os: ubuntu-latest
            compiler: msvc
          - os: macos-latest
            compiler: gcc
          - os: macos-latest
            compiler: msvc
          - os: windows-latest
            compiler: gcc
          - os: windows-latest
            compiler: clang

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev build-essential

      - name: Copy vcpkg.json for Windows Manifest Mode
        if: matrix.os == 'windows-latest'
        run: cp packaging/vcpkg/vcpkg.json .
        shell: bash

      - name: Configure CMake
        shell: bash
        run: |
          EXTRA_ARGS=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            EXTRA_ARGS="-DCMAKE_TOOLCHAIN_FILE=${VCPKG_INSTALLATION_ROOT}/scripts/buildsystems/vcpkg.cmake"
          fi
          cmake -S . -B build $EXTRA_ARGS -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DXYO_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Run Tests
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

  conan-validation:
    name: Conan Package Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Setup Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'
      - name: Install Conan
        run: |
          pip install conan
          conan profile detect --force
      - name: Test Conan Recipe Creation
        run: conan create . --build=missing
